CompetitionMediaRequest:
  type: object
  properties:
    competitionSeq:
      type: integer
      example: 2035
    s3MediaSeqList:
      type: array
      items:
        type: integer
      example: [ 2527, 2528 ]
  required:
    - competitionSeq
    - s3MediaSeqList
Country:
  type: object
  properties:
    codeDetailNo:
      type: string
      example: "AF"
    codeDetailName:
      type: string
      example: "(+93) Afghanistan"
PaypalPayment:
  type: object
  description: 페이팔 결제시
  required:
    - kpnpOrdersSeq
    - orderNum
    - paymentDate
    - payType
    - paymentAmount
    - unit
  properties:
    kpnpOrdersSeq:
      type: string
      example: "47"
      description: 주문 SEQ
    orderNum:
      type: string
      example: "O170902826322267"
      description: 주문 번호
    fullNameKr:
      type: string
      example: "김범준"
      description: 주문자 이름 (한글)
    fullNameEn:
      type: string
      example: "kbj"
      description: 주문자 이름 (영문)
    paymentDate:
      type: string
      example: "2024-03-18 11:48:21.0"
      description: 결제일
    payType:
      type: string
      example: "P"
      description: 결제 방식 (P = Paypal)
    paymentAmount:
      type: number
      format: double
      example: 110.0
      description: 결제 금액
    unit:
      type: string
      example: "usd"
      description: 화폐 단위
MTJPayment:
  type: object
  description: 무통장 결제시
  required:
    - kpnpOrdersSeq
    - orderNum
    - paymentDate
    - payType
    - unit
    - kpnpBankNameEn
    - kpnpBankAccountNum
    - kpnpBankAccountName
    - depositDate
    - depositorName
    - swiftCode
    - kpnpTel
    - kpnpFax
    - kpnpEmail
  properties:
    kpnpOrdersSeq:
      type: string
      example: "19"
      description: 주문 seq
    orderNum:
      type: string
      example: "O170902826322267"
      description: 주문번호
    fullNameKr:
      type: string
      example: "김범준"
      description: 주문자 이름
    fullNameEn:
      type: string
      example: "kbj"
      description: 주문자 이름 En
    payType:
      type: string
      example: "M"
      description: 결제 방식 (M = 무통장)
    paymentDate:
      type: string
      example: "2024-02-27 10:06:29.0"
      description: 입금기간
    paymentAmount:
      type: number
      format: double
      example: 20000.0
      description: 입금할 금액
    unit:
      type: string
      example: "kor"
      description: 화폐
    kpnpBankNameKr:
      type: string
      example: "KEB 하나"
      description: 은행명 Kr
    kpnpBankNameEn:
      type: string
      example: "KEB Hana"
      description: 은행명 En
    kpnpBankAccountNum:
      type: string
      example: "4289-1000-869-238"
      description: 계좌번호
    kpnpBankAccountName:
      type: string
      example: "KPNP CO.LTD"
      description: 예금주
    depositDate:
      type: string
      example: "2024-02-28 10:06"
      description: 입금기간
    depositorName:
      type: string
      example: "곽은정12877"
      description: 입금자명
    swiftCode:
      type: string
      example: "KOEXKRSE"
      description: SWIFT_CODE
    bankAddress:
      type: string
      example: "Gasan Digital 1-Ro, Geumcheon-gu, Seoul, South Korea"
      description: 은행본점 (주소)
    kpnpTel:
      type: string
      example: "02-563-5989"
      description: KPNP 전화번호
    kpnpFax:
      type: string
      example: "02-6449-2989"
      description: KPNP 팩스번호
    kpnpEmail:
      type: string
      example: "Sales1@kpnp.net"
      description: KPNP 담당자 EMAIL
    bankPostalCode:
      type: string
      example: "085-08"
      description: 은행본점 (우편번호)

